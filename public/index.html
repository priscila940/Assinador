<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinador Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 120px;
        }
        .container { width: 100%; max-width: 400px; margin-top: 40px; }
        .header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #a1a1aa; font-size: 14px; }
        h1 { font-size: 38px; font-weight: 700; margin-bottom: 25px; letter-spacing: -0.5px; }
        
        .card-info {
            background-color: #161618;
            border-radius: 16px;
            padding: 20px;
            font-size: 14px;
            color: #a1a1aa;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn-install {
            display: block;
            background-color: #34c759;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4);
            margin-top: 20px;
        }
        .info-footer { color: #52525b; font-size: 13px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">‹ voltar</div>
    <h1>Assinador</h1>
    
    <div class="card-info">
        Assine seus aplicativos via GitHub Actions. Após rodar o fluxo, o botão abaixo instalará o seu app modificado diretamente no aparelho.
    </div>

    <!-- Esse link puxará o manifesto gerado pelo Actions -->
    <a href="#" class="btn-install" id="installBtn">📲 Instalar App Assinado</a>
    
    <div class="info-footer">
        Abra a aba "Actions" no seu repositório para assinar um novo arquivo .ipa
    </div>
</div>

<script>
    // Script corrigido para montar a URL perfeitamente sem dar 404 no plist
    const repoName = window.location.pathname.split('/')[1]; 
    const installBtn = document.getElementById('installBtn');
    installBtn.href = `itms-services://?action=download-manifest&url=https://${window.location.hostname}/${repoName}/manifests/app.plist`;
</script>

</body>
</html>
